<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – MJH Battle Royale Frenzy</title>
  <style>
    body {
      font-family: 'Arial Black', Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
                  linear-gradient(180deg, #263238 0%, #0f1720 55%, #071018 100%);
      color: #ffffff;
      text-align: center;
      padding: 40px;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo {
      font-size: 36px;
      color: #ffd54f;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(255,213,79,0.35);
    }
    .message {
      font-size: 20px;
      margin: 10px 0;
      line-height: 1.5;
    }
    .hint {
      font-size: 16px;
      opacity: 0.75;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="logo">🔥 MJH Battle Royale Frenzy</div>
  <h2>You’re Offline</h2>
  <div class="message">
    No internet connection detected.<br>
    Please reconnect to play the game.
  </div>
  <div class="hint">
    Your high score is saved locally on this device.
  </div>
</body>
</html>
